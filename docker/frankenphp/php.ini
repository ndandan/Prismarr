[PHP]
; Timezone — UTC fallback. The init script (/usr/local/bin/prismarr-init)
; reads the $TZ env var at boot and drops a /usr/local/etc/php/conf.d/zz-tz.ini
; with the user's actual zone, which overrides this default thanks to the
; "zz-" prefix being loaded after this file (issue #12). Setting it to UTC
; here means a missing/invalid $TZ degrades to UTC instead of pretending
; everyone is in Paris.
date.timezone = UTC

; Security
expose_php = Off
display_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Performance
; Issue #13 — bumped to comfortably handle 5–50k-item libraries (Radarr +
; Sonarr return the entire library in one payload, parse + Twig render
; together can blow past 256 MB / 60 s). True pagination ships in 1.1.0;
; until then these limits keep big homelabs working out of the box. 1 GB
; is generous for a single FrankenPHP worker on modern hardware (homelabs
; typically have 8+ GB RAM); the FatalErrorHandlerSubscriber kicks in if
; an even larger library blows past it.
memory_limit = 1024M
max_execution_time = 120
upload_max_filesize = 20M
post_max_size = 20M

; OPcache
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0

; Preload the framework + app class graph into shared memory at boot, so no
; request pays to link them. Symfony emits config/preload.php (which requires
; the compiled var/cache/prod/*.preload.php) during the cache:warmup already
; run at image build, so the referenced files exist in the image. Since the
; code is baked and validate_timestamps=0, the preloaded graph is stable for
; the container's lifetime. preload_user is required when PHP starts as root
; (s6 runs the init as root, then drops to www-data for the server).
opcache.preload = /var/www/html/config/preload.php
opcache.preload_user = www-data

; Realpath cache (Symfony perf)
realpath_cache_size = 4096K
realpath_cache_ttl = 600

[Session]
session.cookie_httponly = 1
session.cookie_secure = 0
session.cookie_samesite = Lax
session.use_strict_mode = 1
