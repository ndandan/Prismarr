    managers: Media
    indexers: Indexers
    downloads: Downloads
    finish: Finish
  step:
    welcome:
      title: Welcome to Prismarr
      subtitle: 'A unified dashboard for your self-hosted media stack. A few minutes are enough to configure everything.'
      features:
        media: Movies & TV shows
        indexers: Indexers
        downloads: Downloads
        discovery: TMDb discovery
      cta: 'Start the setup →'
      language_label: Language
      language:
        en: English
        fr: Français
    admin:
      eyebrow: 'Step 2 of 7'
      title: Create your admin account
      subtitle: 'This account will have access to every Prismarr configuration option. You can create more users later from the admin area.'
      email: Email
      display_name: Display name
      display_name_optional: (optional)
      password: Password
      password_hint: (8 min.)
      password_confirm: Confirm
      toggle_visibility: Show/hide
      back: '← Back'
      cta: 'Create account →'
    tmdb:
      eyebrow: 'Step 3 of 7 · Optional'
      title: The Movie Database (TMDb)
      subtitle: 'Required for the <strong>Discover</strong> page (trending movies & TV shows, recommendations, watchlist). Create a free key on <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org</a>. If you skip this step, Discover will be disabled.'
      api_key: API v3 key
      api_key_hint: 'v3 only — v4 (Bearer token) is not supported yet.'
    managers:
      eyebrow: 'Step 4 of 7 · Optional'
      title: Media managers
      subtitle: 'Radarr manages your movie library, Sonarr manages TV shows. You can configure both, only one, or skip this step.'
      default_instance_hint: 'This becomes your default Radarr / Sonarr instance. You can add more instances later from /admin/settings — useful when you run a separate 1080p + 4K Radarr, or a regular + anime Sonarr.'
      radarr:
        section: '🎬 Radarr — Movies'
        subtitle: Automated movie management service.
      sonarr:
        section: '📺 Sonarr — TV Shows'
        subtitle: Automated TV show management service.
      fields:
        url: URL
        api_key: API key
    indexers:
      eyebrow: 'Step 5 of 7 · Optional'
      title: Indexers & requests
      subtitle: 'Prowlarr centralises your tracker indexers. Seerr lets users request movies and TV shows, which are then sent to Radarr/Sonarr.'
      prowlarr:
        section: '🔎 Prowlarr — Indexers'
        subtitle: Indexer aggregator compatible with Radarr/Sonarr.
      jellyseerr:
        section: '🙋 Seerr — User requests'
        subtitle: Request interface for end users.
    downloads:
      eyebrow: 'Step 6 of 7 · Optional'
      title: Download client
      subtitle: 'qBittorrent is your BitTorrent client. Gluetun is an optional VPN router that sits in front of qBittorrent to mask your IP.'
      qbittorrent:
        section: '⬇️ qBittorrent'
        subtitle: Authentication through the qBittorrent Web UI.
        user: Username
        password: Password
        reverse_proxy_hint: 'Leave the username and password empty if qBittorrent sits behind a reverse proxy that injects authentication itself (qui, traefik forward auth, …).'
      deluge:
        section: Deluge
        subtitle: 'Torrent client (Web UI) — used for the Deluge tab.'
        password: Web UI password
        reverse_proxy_hint: 'Leave the password empty if Deluge sits behind an authenticating reverse proxy that injects the session for you.'
      usenet_optional: 'Usenet — optional'
      sabnzbd:
        section: 'SABnzbd'
        subtitle: 'Usenet download client. Needs the URL and the API key.'
        api_key: 'API key'
      nzbget:
        section: 'NZBGet'
        subtitle: 'Usenet download client. Username and password are optional (reverse proxy / auth disabled on the LAN).'
      gluetun:
        section: 'Gluetun'
        section_suffix: 'VPN — optional'
        subtitle: 'Leave blank if qBittorrent does not route through a VPN.'
        url: URL (Control Server)
        api_key: API key
        api_key_optional: (optional)
        api_key_placeholder: 'X-API-Key value if the Control Server is protected'
    finish:
      eyebrow: 'Step 7 of 7'
      title: "You're all set!"
      subtitle: "Here is a summary of your configuration. You can edit or add services at any time from the admin area."
      badge_configured: Configured
      badge_skipped: Skipped
      cta: 'Launch Prismarr →'
    common:
      back: '← Back'
      skip: Skip this step
      save_next: 'Save and continue →'
  test:
    button: Test connection
    testing: Testing…
    ok: Connected
    category:
      network: Cannot reach service
      auth: Wrong API key or password
      host_whitelist: 'Host blocked by SABnzbd (add it to host_whitelist)'
      forbidden: Access forbidden (403)
      not_found: Endpoint not found (404)
      server_error: Service error (5xx)
      unconfigured: Fill in the URL and credentials first
      unknown: Unexpected response
    error:
