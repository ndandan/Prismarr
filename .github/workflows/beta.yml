name: Beta

# Manually-triggered build of the current `main` as a pre-release image.
# Pushes ONLY the `:beta` tag — never `:latest`, never a versioned tag,
# never a GitHub release. The stable Release workflow is untouched.
#
# Opt-in for testers:  image: shoshuo/prismarr:beta
#
# Required repository secrets:
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN
# Optional repository variable:
#   - DOCKERHUB_IMAGE  (defaults to "shoshuo/prismarr")

on:
  workflow_dispatch:
    inputs:
      beta_number:
        description: "Beta build number (1, 2, 3, …) — reset to 1 for each new version"
        required: true
        default: "1"

jobs:
  beta:
    name: Build and push :beta (amd64 + arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # need the full tag history to derive the next version

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        run: echo "name=${{ vars.DOCKERHUB_IMAGE || 'shoshuo/prismarr' }}" >> "$GITHUB_OUTPUT"

      - name: Compose the beta version string
        id: ver
        # Base = the last stable tag (vX.Y.Z) with the patch bumped by one — the
        # next patch the dev line targets. Tagging a stable release auto-advances
        # it (after v1.1.2, betas become 1.1.3-beta.N), so this never needs hand
        # editing. version_compare ranks the beta above the last stable but below
        # the target, nudging testers to stable once it ships. For a minor/major
        # bump just tag it directly and the next betas follow from there.
        run: |
          last=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 | sed 's/^v//')
          last=${last:-1.1.1}
          IFS=. read -r major minor patch <<< "$last"
          base="${major}.${minor}.$((patch + 1))"
          echo "version=${base}-beta.${{ inputs.beta_number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:beta
          labels: |
            org.opencontainers.image.title=Prismarr
            org.opencontainers.image.description=Self-hosted media stack dashboard — Radarr, Sonarr, Prowlarr, Jellyseerr, qBittorrent, TMDb in one Symfony UI. (pre-release)
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.url=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.vendor=Prismarr
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          build-args: |
            PRISMARR_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
