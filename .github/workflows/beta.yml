name: Beta

# Manually-triggered build of the current `main` as a pre-release image.
# Pushes ONLY the `:beta` tag — never `:latest`, never a versioned tag,
# never a GitHub release. The stable Release workflow is untouched.
#
# Opt-in for testers:  image: shoshuo/prismarr:beta
#
# Required repository secrets:
#   - DOCKERHUB_USERNAME
#   - DOCKERHUB_TOKEN
# Optional repository variable:
#   - DOCKERHUB_IMAGE  (defaults to "shoshuo/prismarr")

on:
  workflow_dispatch:
    inputs:
      beta_number:
        description: "Beta build number (1, 2, 3, …) — reset to 1 for each new version"
        required: true
        default: "1"

# The next stable version the dev line is heading toward. Bump it right after
# cutting a release so :beta sorts ABOVE the last stable in semver (e.g. after
# 1.1.1 ships, set it to 1.1.2), never below it. Keep in sync with
# App\Service\AppVersion::VERSION.
env:
  BETA_VERSION_BASE: "1.1.2"

jobs:
  beta:
    name: Build and push :beta (amd64 + arm64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        run: echo "name=${{ vars.DOCKERHUB_IMAGE || 'shoshuo/prismarr' }}" >> "$GITHUB_OUTPUT"

      - name: Compose the beta version string
        id: ver
        # e.g. "1.1.2-beta.1" — version_compare ranks this above the last
        # stable (1.1.1) but below the target base, so testers get nudged to the
        # stable once it ships. The build number is the manual workflow input.
        run: echo "version=${BETA_VERSION_BASE}-beta.${{ inputs.beta_number }}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:beta
          labels: |
            org.opencontainers.image.title=Prismarr
            org.opencontainers.image.description=Self-hosted media stack dashboard — Radarr, Sonarr, Prowlarr, Jellyseerr, qBittorrent, TMDb in one Symfony UI. (pre-release)
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.url=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.vendor=Prismarr
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
          build-args: |
            PRISMARR_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
