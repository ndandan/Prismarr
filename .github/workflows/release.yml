name: Release

# Triggered by pushing a stable version tag like v1.0.0. Builds a multi-arch
# image (amd64 + arm64) and pushes it to Docker Hub under shoshuo/prismarr,
# including the `latest` tag, and creates a GitHub release.
#
# Pre-release tags (anything with a hyphen, e.g. v1.1.0-beta.1 or v1.1.0-rc.2)
# are deliberately ignored — pre-release builds go through the separate
# `beta.yml` workflow which only ever touches the `:beta` Docker tag. The
# `latest` Docker tag is also gated below as a second safety net, so even if
# this trigger were ever loosened, a hyphenated tag still can't clobber it.
#
# Required repository secrets:
#   - DOCKERHUB_USERNAME : Docker Hub login
#   - DOCKERHUB_TOKEN    : Docker Hub access token (Account Settings → Security)
#
# Repository variable (optional, defaults to "shoshuo/prismarr"):
#   - DOCKERHUB_IMAGE    : full image name to publish (e.g. "shoshuo/prismarr")

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-*"  # ignore pre-release tags (v1.1.0-beta.1, v1.1.0-rc.2, …)

jobs:
  release:
    name: Build and push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write  # Needed to attach the GitHub release
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image name
        id: image
        run: echo "name=${{ vars.DOCKERHUB_IMAGE || 'shoshuo/prismarr' }}" >> "$GITHUB_OUTPUT"

      - name: Strip leading "v" from tag
        id: ver
        # Issue #11 — the tag is "v1.0.6" but App\Service\AppVersion::VERSION
        # is the bare "1.0.6", so the build-arg passes the stripped form to
        # match exactly what the UI displays.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
          labels: |
            org.opencontainers.image.title=Prismarr
            org.opencontainers.image.description=Self-hosted media stack dashboard — Radarr, Sonarr, Prowlarr, Jellyseerr, qBittorrent, TMDb in one Symfony UI.
            org.opencontainers.image.licenses=AGPL-3.0-or-later
            org.opencontainers.image.source=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.url=https://github.com/Shoshuo/Prismarr
            org.opencontainers.image.documentation=https://github.com/Shoshuo/Prismarr#readme
            org.opencontainers.image.vendor=Prismarr
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/frankenphp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PRISMARR_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { p = 0 }
            /^## \[/ {
              if (p) exit
              if ($0 ~ "\\[" ver "\\]") { p = 1; next }
            }
            p { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${version}" > release-notes.md
          fi
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: Prismarr ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
